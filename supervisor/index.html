<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor - SOMALI STAR ACADEMY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-900 min-h-screen">
    <nav class="bg-gray-800/80 backdrop-blur-md border-b border-gray-700/50 px-4 py-2.5">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <img src="../image.png" class="h-8">
                <span class="text-white font-bold">Supervisor Panel</span>
            </div>
            <button onclick="logout()" class="px-4 py-2 bg-red-600/20 text-red-400 rounded-lg hover:bg-red-600/30 text-sm">
                <i class="fas fa-sign-out-alt mr-1"></i>Logout
            </button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto p-6">
        <div class="text-center py-20">
            <i class="fas fa-eye text-6xl text-teal-400 mb-6"></i>
            <h1 class="text-3xl font-bold text-white mb-4">Supervisor Dashboard</h1>
            <p class="text-gray-400">Coming soon. Use Manager account for now.</p>
            <a href="../manager/" class="inline-block mt-6 px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700">Go to Manager</a>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('somstar_user') || '{}');
        if (!user.id) window.location.href = '../login.html';
        function logout() { localStorage.removeItem('somstar_user'); window.location.href = '../login.html'; }
    </script>
</body>
</html>
