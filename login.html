<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SOMSTAR Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script>if(localStorage.getItem('somstar_dark')==='true')document.body.classList.add('dark-mode');</script>

    <div class="login-container relative">
        <div class="absolute inset-0 overflow-hidden opacity-20">
            <div class="absolute top-10 left-10 w-64 h-64 bg-blue-400 rounded-full blur-3xl animate-pulse"></div>
            <div class="absolute bottom-10 right-10 w-80 h-80 bg-indigo-400 rounded-full blur-3xl animate-pulse" style="animation-delay:1s"></div>
        </div>

        <div class="login-card relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl">S</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Welcome Back</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Sign in to your account</p>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div onclick="selectRole('manager',this)" class="role-selector p-3 rounded-xl text-center border border-gray-200 dark:border-gray-600 active">
                    <i class="fas fa-user-cog text-lg text-blue-600 dark:text-blue-400"></i>
                    <div class="text-xs font-medium text-gray-700 dark:text-gray-300 mt-1">Manager</div>
                </div>
                <div onclick="selectRole('teacher',this)" class="role-selector p-3 rounded-xl text-center border border-gray-200 dark:border-gray-600">
                    <i class="fas fa-chalkboard-teacher text-lg text-green-600 dark:text-green-400"></i>
                    <div class="text-xs font-medium text-gray-700 dark:text-gray-300 mt-1">Teacher</div>
                </div>
                <div onclick="selectRole('student',this)" class="role-selector p-3 rounded-xl text-center border border-gray-200 dark:border-gray-600">
                    <i class="fas fa-user-graduate text-lg text-purple-600 dark:text-purple-400"></i>
                    <div class="text-xs font-medium text-gray-700 dark:text-gray-300 mt-1">Student</div>
                </div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" id="idLabel">User ID</label>
                    <input type="text" id="userId" class="form-input" placeholder="Enter your ID" required>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-700 dark:text-blue-400">Forgot password?</a>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-base flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>

                <div class="text-center mt-6">
                   
                </div>
            </form>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentRole = 'manager';

        function selectRole(role, el) {
            currentRole = role;
            document.querySelectorAll('.role-selector').forEach(r => r.classList.remove('active'));
            el.classList.add('active');
            const label = document.getElementById('idLabel');
            if (role === 'manager') label.textContent = 'Manager ID';
            else if (role === 'teacher') label.textContent = 'Teacher ID';
            else label.textContent = 'Student ID';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                if (currentRole === 'manager') {
                    if (userId === 'MANAGER' && password === '@som1234') {
                        SOMSTAR.showNotification('Welcome Manager!', 'success');
                        localStorage.setItem('somstar_user', JSON.stringify({
                            id: 'MANAGER', role: 'manager', name: 'Manager', uid: 'manager'
                        }));
                        setTimeout(() => window.location.href = 'manager/index.html', 500);
                        return;
                    }
                    throw new Error('Invalid manager credentials');
                }

                // Student login
                if (currentRole === 'student') {
                    const snap = await db.ref('students').orderByChild('studentId').equalTo(userId).once('value');
                    const data = snap.val();
                    if (!data) throw new Error('Invalid credentials');

                    const uid = Object.keys(data)[0];
                    const student = data[uid];

                    if (student.password !== password) throw new Error('Invalid credentials');
                    if (student.status === 'disabled') throw new Error('Account disabled. Contact manager.');

                    localStorage.setItem('somstar_user', JSON.stringify({
                        id: userId, role: 'student', name: student.fullName || userId, uid: uid
                    }));
                    SOMSTAR.showNotification('Welcome ' + (student.fullName || 'Student') + '!', 'success');
                    setTimeout(() => window.location.href = 'student/index.html', 500);
                    return;
                }

                // Teacher login
                if (currentRole === 'teacher') {
                    const snap = await db.ref('teachers').orderByChild('teacherId').equalTo(userId).once('value');
                    const data = snap.val();
                    if (!data) throw new Error('Invalid credentials');

                    const tid = Object.keys(data)[0];
                    const teacher = data[tid];
                    if (teacher.password !== password) throw new Error('Invalid credentials');

                    localStorage.setItem('somstar_user', JSON.stringify({
                        id: userId, role: 'teacher', name: teacher.name || userId, uid: tid
                    }));
                    SOMSTAR.showNotification('Welcome ' + (teacher.name || 'Teacher') + '!', 'success');
                    setTimeout(() => window.location.href = 'teacher/index.html', 500);
                    return;
                }

            } catch (err) {
                SOMSTAR.showNotification(err.message, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        }
    </script>
</body>
</html>
