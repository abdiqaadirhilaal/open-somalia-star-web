<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SOMALI STAR ACADEMY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .login-page {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 30%, #06b6d4 70%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .float-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            animation: floatBlob 20s infinite;
        }
        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(50px, -50px) scale(1.1) rotate(90deg); }
            50% { transform: translate(-30px, 30px) scale(0.9) rotate(180deg); }
            75% { transform: translate(40px, 40px) scale(1.05) rotate(270deg); }
        }
        .glassmorphism {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .dark-mode .glassmorphism {
            background: rgba(15,23,42,0.85);
            border-color: rgba(255,255,255,0.06);
        }
        .input-glass {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.1);
            border-color: rgba(6,182,212,0.6);
            box-shadow: 0 0 0 4px rgba(6,182,212,0.1);
        }
        .dark-mode .input-glass {
            background: rgba(55,65,81,0.6);
            border-color: rgba(75,85,99,0.5);
        }
        .dark-mode .input-glass:focus {
            border-color: rgba(59,130,246,0.6);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
    </style>
</head>
<body class="login-page min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <script>if(localStorage.getItem('somstar_dark')==='true')document.body.classList.add('dark-mode');</script>

    <!-- Floating background shapes -->
    <div class="float-shape w-96 h-96 top-[-120px] left-[-120px] opacity-30" style="animation-delay:0s"></div>
    <div class="float-shape w-80 h-80 bottom-[-100px] right-[-100px] opacity-20" style="animation-delay:5s"></div>
    <div class="float-shape w-64 h-64 top-1/2 right-[-80px] opacity-15" style="animation-delay:10s"></div>
    <div class="float-shape w-48 h-48 bottom-1/4 left-[-60px] opacity-25" style="animation-delay:15s"></div>
    <div class="float-shape w-32 h-32 top-1/3 left-1/4 opacity-20" style="animation-delay:3s"></div>

    <!-- Brand badge top-left -->
    <div class="absolute top-6 left-6 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center shadow-lg shadow-blue-500/30">
            <span class="text-white font-bold text-lg"><img height="20px" width="60px" src="./image.png" alt=""></span>
        </div>
        <div class="hidden sm:block">
            <span class="text-white font-extrabold text-base tracking-tight">SOMALI <span class="text-cyan-300">STAR</span></span>
            <div class="text-[10px] text-blue-200/80 uppercase tracking-widest">English Academy</div>
        </div>
    </div>

    <!-- Dark mode toggle top-right -->
    <div class="absolute top-6 right-6">
        <button onclick="document.body.classList.toggle('dark-mode');localStorage.setItem('somstar_dark',document.body.classList.contains('dark-mode'))" class="w-10 h-10 rounded-xl glassmorphism flex items-center justify-center text-white/80 hover:text-white hover:bg-white/10 transition-all duration-300">
            <i class="fas fa-moon text-lg"></i>
        </button>
    </div>

    <div class="w-full max-w-[420px] relative z-10 animate-fadeIn">
        <div class="glassmorphism rounded-3xl p-8 md:p-10 shadow-2xl shadow-black/20">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-yellow-400 to-amber-500 flex items-center justify-center mx-auto mb-5 shadow-xl shadow-amber-500/30">
                    <i class="fas fa-graduation-cap text-2xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-1">Welcome Back</h2>
                <p class="text-blue-200/70 text-sm">Sign in to continue learning</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-blue-200 mb-2">User ID / Student ID</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-blue-300/50 text-sm"></i>
                        <input type="text" id="userId" class="input-glass w-full pl-10 pr-4 py-3 rounded-xl text-white placeholder-blue-200/40 text-sm outline-none" placeholder="Enter your ID" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-blue-200 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-blue-300/50 text-sm"></i>
                        <input type="password" id="password" class="input-glass w-full pl-10 pr-12 py-3 rounded-xl text-white placeholder-blue-200/40 text-sm outline-none" placeholder="Enter your password" required>
                        <button type="button" onclick="togglePassword()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-blue-300/50 hover:text-blue-200 transition-colors">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="w-full py-3.5 rounded-xl text-white font-semibold text-base bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 transition-all duration-300 flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>
            </form>

            <div class="text-center mt-8">
                <p class="text-blue-200/40 text-xs">
                    <i class="fas fa-shield-alt mr-1"></i>
                    Secured platform for Somali Star Academy
                </p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        function detectRole(userId) {
            const id = userId.toUpperCase();
            if (id === 'MANAGER') return 'manager';
            if (id === 'SAACID') return 'finance';
            if (id === 'CABAAS') return 'supervisor';
            if (id === 'CABDALAH') return 'practice-teacher';
            if (id.startsWith('TCH')) return 'teacher';
            return 'student';
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            icon.className = pwd.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = detectRole(userId);

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, password, role })
                });
                let result;
                try { result = await res.json(); } catch(e) { result = {}; }
                if (!res.ok) throw new Error(result.error || 'Invalid credentials');

                const displayName = result.data.fullName || result.data.name || userId;
                localStorage.setItem('somstar_user', JSON.stringify({
                    id: userId,
                    role: result.role,
                    name: displayName,
                    uid: result.data.uid || 'manager'
                }));
                SOMSTAR.showNotification('Welcome ' + displayName + '!', 'success');
                const paths = { manager: 'manager/', student: 'student/', teacher: 'teacher/', finance: 'finance/', supervisor: 'supervisor/', 'practice-teacher': 'practice-teacher/' };
                setTimeout(() => window.location.href = paths[result.role] + 'index.html', 500);

            } catch (err) {
                SOMSTAR.showNotification(err.message, 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        }
    </script>
</body>
</html>
