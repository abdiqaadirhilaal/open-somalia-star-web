services:
  - type: web
    name: somstar-academy
    runtime: node
    repo: https://github.com/abdiqaadirhilaal/open-somalia-star-web
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromDatabase:
          name: somstar-db
          property: connectionString

databases:
  - name: somstar-db
    plan: free
    databaseName: somstar
    ipAllowList: []
