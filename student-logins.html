<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Logins - SOMSTAR Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <script>if(localStorage.getItem('somstar_dark')==='true')document.body.classList.add('dark-mode');</script>

    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-purple-700 flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-bold text-2xl">S</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Student Login Credentials</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Ku gal login.g casharada SOMSTAR</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm mb-4">
            <div class="flex gap-2 mb-4">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchStudent" class="form-input text-sm py-2.5 pl-10" placeholder="Search Student ID..." onkeyup="filterStudents()">
                </div>
            </div>

            <div id="studentList" class="space-y-2">
                <div class="text-center text-gray-400 py-8">
                    <i class="fas fa-spinner fa-spin text-2xl block mb-2"></i>
                    Loading students...
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-gray-100 dark:border-gray-700 text-center text-sm text-gray-400">
                <span id="studentCount">0</span> students found
                &middot; Default password: <code class="font-mono text-blue-600">@som1234</code>
            </div>
        </div>

        <div class="text-center">
            <a href="login.html" class="btn-primary inline-flex items-center gap-2 px-6 py-3 rounded-xl text-white font-medium text-sm">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        let students = [];

        async function loadStudents() {
            try {
                const snap = await db.ref('students').once('value');
                const data = snap.val();
                if (!data) {
                    document.getElementById('studentList').innerHTML = '<div class="text-center text-gray-400 py-8">No students found. Manager must create accounts first.</div>';
                    return;
                }
                students = Object.values(data).filter(s => s.studentId);
                renderStudents(students);
            } catch(e) {
                document.getElementById('studentList').innerHTML = '<div class="text-center text-red-400 py-8">Error loading students. Check Firebase config.</div>';
            }
        }

        function renderStudents(list) {
            const container = document.getElementById('studentList');
            document.getElementById('studentCount').textContent = list.length;

            if (list.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">No students match your search</div>';
                return;
            }

            container.innerHTML = list.map(s => {
                const isDisabled = s.status === 'disabled';
                return `<div class="flex items-center justify-between p-4 rounded-xl ${isDisabled ? 'bg-gray-50 dark:bg-gray-700/30 opacity-60' : 'bg-gray-50 dark:bg-gray-700/50 hover:bg-blue-50 dark:hover:bg-gray-700'} transition border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br ${isDisabled ? 'from-gray-400 to-gray-500' : 'from-purple-500 to-purple-600'} flex items-center justify-center text-white font-bold text-sm">
                            ${(s.fullName || s.studentId).charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <div class="font-mono font-medium text-gray-900 dark:text-white text-sm">${s.studentId}</div>
                            <div class="text-xs text-gray-500">${s.fullName || 'No name'}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono text-sm text-gray-600 dark:text-gray-400">${s.password || '@som1234'}</div>
                        ${isDisabled ? '<div class="text-xs text-red-500 font-medium">DISABLED</div>' : '<div class="text-xs text-green-500">Active</div>'}
                    </div>
                </div>`;
            }).join('');
        }

        function filterStudents() {
            const q = document.getElementById('searchStudent').value.toLowerCase().trim();
            if (!q) { renderStudents(students); return; }
            const filtered = students.filter(s =>
                (s.studentId || '').toLowerCase().includes(q) ||
                (s.fullName || '').toLowerCase().includes(q)
            );
            renderStudents(filtered);
        }

        loadStudents();
    </script>
</body>
</html>
